AWSTemplateFormatVersion: '2010-09-09'
Description: 'GameSphere - Main Infrastructure Stack (Nested)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: gamesphere
    Description: Project name used for resource naming

  TemplatesBucketName:
    Type: String
    Description: S3 bucket name where nested stack templates are stored

  HostingEnabled:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable or disable the S3/CloudFront hosting stack

Conditions:
  DeployHostingStack: !Equals [!Ref HostingEnabled, 'true']

Resources:
  # Cognito Stack
  CognitoStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/templates/cognito.yaml'
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # DynamoDB Stack
  DynamoDBStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/templates/dynamodb.yaml'
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # AppSync Stack
  AppSyncStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - CognitoStack
      - DynamoDBStack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/templates/appsync.yaml'
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
        UsersTableName: !GetAtt DynamoDBStack.Outputs.UsersTableName
        UsersTableArn: !GetAtt DynamoDBStack.Outputs.UsersTableArn
        PlayerStatsTableName: !GetAtt DynamoDBStack.Outputs.PlayerStatsTableName
        PlayerStatsTableArn: !GetAtt DynamoDBStack.Outputs.PlayerStatsTableArn
        GamesTableName: !GetAtt DynamoDBStack.Outputs.GamesTableName
        GamesTableArn: !GetAtt DynamoDBStack.Outputs.GamesTableArn
        FriendsTableName: !GetAtt DynamoDBStack.Outputs.FriendsTableName
        FriendsTableArn: !GetAtt DynamoDBStack.Outputs.FriendsTableArn
        SessionsTableName: !GetAtt DynamoDBStack.Outputs.SessionsTableName
        SessionsTableArn: !GetAtt DynamoDBStack.Outputs.SessionsTableArn
        AchievementsTableName: !GetAtt DynamoDBStack.Outputs.AchievementsTableName
        AchievementsTableArn: !GetAtt DynamoDBStack.Outputs.AchievementsTableArn
        ActivitiesTableName: !GetAtt DynamoDBStack.Outputs.ActivitiesTableName
        ActivitiesTableArn: !GetAtt DynamoDBStack.Outputs.ActivitiesTableArn
        LeaderboardTableName: !GetAtt DynamoDBStack.Outputs.LeaderboardTableName
        LeaderboardTableArn: !GetAtt DynamoDBStack.Outputs.LeaderboardTableArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # S3 & CloudFront Stack for Frontend Hosting
  HostingStack:
    Type: AWS::CloudFormation::Stack
    Condition: DeployHostingStack
    Properties:
      TemplateURL: !Sub 'https://s3.amazonaws.com/${TemplatesBucketName}/templates/hosting.yaml'
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  # Cognito Outputs
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !GetAtt CognitoStack.Outputs.UserPoolId
    Export:
      Name: !Sub '${ProjectName}-${Environment}-main-UserPoolId'

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !GetAtt CognitoStack.Outputs.UserPoolClientId
    Export:
      Name: !Sub '${ProjectName}-${Environment}-main-UserPoolClientId'

  IdentityPoolId:
    Description: Cognito Identity Pool ID
    Value: !GetAtt CognitoStack.Outputs.IdentityPoolId
    Export:
      Name: !Sub '${ProjectName}-${Environment}-main-IdentityPoolId'

  # AppSync Outputs
  GraphQLApiEndpoint:
    Description: AppSync GraphQL API Endpoint
    Value: !GetAtt AppSyncStack.Outputs.GraphQLApiEndpoint
    Export:
      Name: !Sub '${ProjectName}-${Environment}-main-GraphQLApiEndpoint'

  GraphQLApiId:
    Description: AppSync GraphQL API ID
    Value: !GetAtt AppSyncStack.Outputs.GraphQLApiId
    Export:
      Name: !Sub '${ProjectName}-${Environment}-main-GraphQLApiId'

  # Hosting Outputs (conditional)
  WebsiteURL:
    Condition: DeployHostingStack
    Description: CloudFront Distribution URL
    Value: !GetAtt HostingStack.Outputs.WebsiteURL
    Export:
      Name: !Sub '${ProjectName}-${Environment}-main-WebsiteURL'

  S3BucketName:
    Condition: DeployHostingStack
    Description: S3 Bucket for frontend assets
    Value: !GetAtt HostingStack.Outputs.S3BucketName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-main-S3BucketName'

  CloudFrontDistributionId:
    Condition: DeployHostingStack
    Description: CloudFront Distribution ID
    Value: !GetAtt HostingStack.Outputs.CloudFrontDistributionId
    Export:
      Name: !Sub '${ProjectName}-${Environment}-main-CloudFrontDistributionId'