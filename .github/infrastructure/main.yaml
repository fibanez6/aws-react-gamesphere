AWSTemplateFormatVersion: '2010-09-09'
Description: 'GameSphere - Main Infrastructure Stack (Nested)'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: gamesphere
    Description: Project name used for resource naming

Resources:
  # Cognito Stack
  CognitoStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./cognito.yaml
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # DynamoDB Stack
  DynamoDBStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./dynamodb.yaml
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # AppSync Stack
  AppSyncStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - CognitoStack
      - DynamoDBStack
    Properties:
      TemplateURL: ./appsync.yaml
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
        UserPoolId: !GetAtt CognitoStack.Outputs.UserPoolId
        UsersTableName: !GetAtt DynamoDBStack.Outputs.UsersTableName
        UsersTableArn: !GetAtt DynamoDBStack.Outputs.UsersTableArn
        GamesTableName: !GetAtt DynamoDBStack.Outputs.GamesTableName
        GamesTableArn: !GetAtt DynamoDBStack.Outputs.GamesTableArn
        FriendsTableName: !GetAtt DynamoDBStack.Outputs.FriendsTableName
        FriendsTableArn: !GetAtt DynamoDBStack.Outputs.FriendsTableArn
        SessionsTableName: !GetAtt DynamoDBStack.Outputs.SessionsTableName
        SessionsTableArn: !GetAtt DynamoDBStack.Outputs.SessionsTableArn
        AchievementsTableName: !GetAtt DynamoDBStack.Outputs.AchievementsTableName
        AchievementsTableArn: !GetAtt DynamoDBStack.Outputs.AchievementsTableArn
        ActivitiesTableName: !GetAtt DynamoDBStack.Outputs.ActivitiesTableName
        ActivitiesTableArn: !GetAtt DynamoDBStack.Outputs.ActivitiesTableArn
        LeaderboardTableName: !GetAtt DynamoDBStack.Outputs.LeaderboardTableName
        LeaderboardTableArn: !GetAtt DynamoDBStack.Outputs.LeaderboardTableArn
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # S3 & CloudFront Stack for Frontend Hosting
  HostingStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./hosting.yaml
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref ProjectName
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

Outputs:
  # Cognito Outputs
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !GetAtt CognitoStack.Outputs.UserPoolId
    Export:
      Name: !Sub '${ProjectName}-${Environment}-UserPoolId'

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !GetAtt CognitoStack.Outputs.UserPoolClientId
    Export:
      Name: !Sub '${ProjectName}-${Environment}-UserPoolClientId'

  # AppSync Outputs
  GraphQLApiEndpoint:
    Description: AppSync GraphQL API Endpoint
    Value: !GetAtt AppSyncStack.Outputs.GraphQLApiEndpoint
    Export:
      Name: !Sub '${ProjectName}-${Environment}-GraphQLApiEndpoint'

  GraphQLApiId:
    Description: AppSync GraphQL API ID
    Value: !GetAtt AppSyncStack.Outputs.GraphQLApiId
    Export:
      Name: !Sub '${ProjectName}-${Environment}-GraphQLApiId'

  # Hosting Outputs
  WebsiteURL:
    Description: CloudFront Distribution URL
    Value: !GetAtt HostingStack.Outputs.WebsiteURL
    Export:
      Name: !Sub '${ProjectName}-${Environment}-WebsiteURL'

  S3BucketName:
    Description: S3 Bucket for frontend assets
    Value: !GetAtt HostingStack.Outputs.S3BucketName
    Export:
      Name: !Sub '${ProjectName}-${Environment}-S3BucketName'
