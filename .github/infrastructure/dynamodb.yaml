AWSTemplateFormatVersion: '2010-09-09'
Description: 'GameSphere - DynamoDB Tables for Game Data Storage'

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: gamesphere
    Description: Project name

  BillingMode:
    Type: String
    Default: PAY_PER_REQUEST
    AllowedValues:
      - PAY_PER_REQUEST
      - PROVISIONED
    Description: DynamoDB billing mode

Resources:
  # Users Table
  UsersTable:
    Type: AWS::DynamoDB::Table
    # DeletionPolicy: Retain
    # UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Environment}-users'
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: username-index
          KeySchema:
            - AttributeName: username
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Games Table
  GamesTable:
    Type: AWS::DynamoDB::Table
    # DeletionPolicy: Retain
    # UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Environment}-games'
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: genre
          AttributeType: S
        - AttributeName: activePlayers
          AttributeType: N
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: genre-activePlayers-index
          KeySchema:
            - AttributeName: genre
              KeyType: HASH
            - AttributeName: activePlayers
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Player Stats Table
  PlayerStatsTable:
    Type: AWS::DynamoDB::Table
    # DeletionPolicy: Retain
    # UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Environment}-player-stats'
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Friends Table (Adjacency List Pattern)
  FriendsTable:
    Type: AWS::DynamoDB::Table
    # DeletionPolicy: Retain
    # UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Environment}-friends'
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: friendId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: friendId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: friendId-index
          KeySchema:
            - AttributeName: friendId
              KeyType: HASH
            - AttributeName: userId
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: userId-status-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Game Sessions Table
  SessionsTable:
    Type: AWS::DynamoDB::Table
    # DeletionPolicy: Retain
    # UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Environment}-sessions'
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: gameId
          AttributeType: S
        - AttributeName: startTime
          AttributeType: S
        - AttributeName: isActive
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: userId-startTime-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: startTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: gameId-startTime-index
          KeySchema:
            - AttributeName: gameId
              KeyType: HASH
            - AttributeName: startTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: isActive-index
          KeySchema:
            - AttributeName: isActive
              KeyType: HASH
            - AttributeName: startTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Achievements Table
  AchievementsTable:
    Type: AWS::DynamoDB::Table
    # DeletionPolicy: Retain
    # UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Environment}-achievements'
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: gameId
          AttributeType: S
        - AttributeName: unlockedAt
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: userId-unlockedAt-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: unlockedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: gameId-index
          KeySchema:
            - AttributeName: gameId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Activities Table (Feed)
  ActivitiesTable:
    Type: AWS::DynamoDB::Table
    # DeletionPolicy: Retain
    # UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Environment}-activities'
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
        - AttributeName: type
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: userId-createdAt-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: type-createdAt-index
          KeySchema:
            - AttributeName: type
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Leaderboard Table
  LeaderboardTable:
    Type: AWS::DynamoDB::Table
    # DeletionPolicy: Retain
    # UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${ProjectName}-${Environment}-leaderboard'
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: score
          AttributeType: N
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: score
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # Game Stats Table (per-user, per-game statistics)
  GameStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${ProjectName}-${Environment}-game-stats'
      BillingMode: !Ref BillingMode
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: gameId
          AttributeType: S
        - AttributeName: lastPlayed
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: gameId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gameId-lastPlayed-index
          KeySchema:
            - AttributeName: gameId
              KeyType: HASH
            - AttributeName: lastPlayed
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

Conditions:
  IsProd: !Equals [!Ref Environment, 'prod']

Outputs:
  TablePrefix:
    Description: DynamoDB Table Prefix
    Value: !Sub '${ProjectName}-${Environment}'
    Export:
      Name: !Sub '${ProjectName}-${Environment}-TablePrefix'

  UsersTableName:
    Description: Users Table Name
    Value: !Ref UsersTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-UsersTableName'

  UsersTableArn:
    Description: Users Table ARN
    Value: !GetAtt UsersTable.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-UsersTableArn'

  UsersTableStreamArn:
    Description: Users Table Stream ARN
    Value: !GetAtt UsersTable.StreamArn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-UsersTableStreamArn'

  GamesTableName:
    Description: Games Table Name
    Value: !Ref GamesTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-GamesTableName'

  GamesTableArn:
    Description: Games Table ARN
    Value: !GetAtt GamesTable.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-GamesTableArn'

  FriendsTableName:
    Description: Friends Table Name
    Value: !Ref FriendsTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-FriendsTableName'

  FriendsTableArn:
    Description: Friends Table ARN
    Value: !GetAtt FriendsTable.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-FriendsTableArn'

  SessionsTableName:
    Description: Sessions Table Name
    Value: !Ref SessionsTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-SessionsTableName'

  SessionsTableArn:
    Description: Sessions Table ARN
    Value: !GetAtt SessionsTable.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-SessionsTableArn'

  AchievementsTableName:
    Description: Achievements Table Name
    Value: !Ref AchievementsTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-AchievementsTableName'

  AchievementsTableArn:
    Description: Achievements Table ARN
    Value: !GetAtt AchievementsTable.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-AchievementsTableArn'

  ActivitiesTableName:
    Description: Activities Table Name
    Value: !Ref ActivitiesTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ActivitiesTableName'

  ActivitiesTableArn:
    Description: Activities Table ARN
    Value: !GetAtt ActivitiesTable.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-ActivitiesTableArn'

  LeaderboardTableName:
    Description: Leaderboard Table Name
    Value: !Ref LeaderboardTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-LeaderboardTableName'

  LeaderboardTableArn:
    Description: Leaderboard Table ARN
    Value: !GetAtt LeaderboardTable.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-LeaderboardTableArn'

  PlayerStatsTableName:
    Description: Player Stats Table Name
    Value: !Ref PlayerStatsTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-PlayerStatsTableName'

  PlayerStatsTableArn:
    Description: Player Stats Table ARN
    Value: !GetAtt PlayerStatsTable.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-PlayerStatsTableArn'

  GameStatsTableName:
    Description: Game Stats Table Name
    Value: !Ref GameStatsTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-GameStatsTableName'

  GameStatsTableArn:
    Description: Game Stats Table ARN
    Value: !GetAtt GameStatsTable.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-GameStatsTableArn'
