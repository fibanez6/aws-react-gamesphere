  updateUserResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Mutation
      FieldName: updateUser
      DataSourceName: !GetAtt UsersDataSource.Name
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      Code: |
        import { util } from '@aws-appsync/utils';
        
        export function request(ctx) {
          const now = util.time.nowISO8601();
          const updates = [];
          
          if (ctx.args.input.username) {
            updates.push('username = :username');
          }
          if (ctx.args.input.avatar) {
            updates.push('avatar = :avatar');
          }
          
          const expression = 'SET ' + updates.join(', ') + ', updatedAt = :updatedAt';
          
          const expressionValues = {
            ':updatedAt': now,
          };
          
          if (ctx.args.input.username) {
            expressionValues[':username'] = ctx.args.input.username;
          }
          if (ctx.args.input.avatar) {
            expressionValues[':avatar'] = ctx.args.input.avatar;
          }
          
          return {
            operation: 'UpdateItem',
            key: util.dynamodb.toMapValues({ id: ctx.identity.sub }),
            update: {
              expression,
              expressionValues: util.dynamodb.toMapValues(expressionValues),
            },
          };
        }
        
        export function response(ctx) {
          return ctx.result;
        }

