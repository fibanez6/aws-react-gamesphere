AWSTemplateFormatVersion: '2010-09-09'
Description: 'GameSphere - AWS AppSync GraphQL API'

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Deployment environment

  ProjectName:
    Type: String
    Default: gamesphere
    Description: Project name

  UserPoolId:
    Type: String
    Description: Cognito User Pool ID

  UsersTableName:
    Type: String
    Description: DynamoDB Users Table Name

  UsersTableArn:
    Type: String
    Description: DynamoDB Users Table ARN

  GamesTableName:
    Type: String
    Description: DynamoDB Games Table Name

  GamesTableArn:
    Type: String
    Description: DynamoDB Games Table ARN

  FriendsTableName:
    Type: String
    Description: DynamoDB Friends Table Name

  FriendsTableArn:
    Type: String
    Description: DynamoDB Friends Table ARN

  SessionsTableName:
    Type: String
    Description: DynamoDB Sessions Table Name

  SessionsTableArn:
    Type: String
    Description: DynamoDB Sessions Table ARN

  AchievementsTableName:
    Type: String
    Description: DynamoDB Achievements Table Name

  AchievementsTableArn:
    Type: String
    Description: DynamoDB Achievements Table ARN

  ActivitiesTableName:
    Type: String
    Description: DynamoDB Activities Table Name

  ActivitiesTableArn:
    Type: String
    Description: DynamoDB Activities Table ARN

  LeaderboardTableName:
    Type: String
    Description: DynamoDB Leaderboard Table Name

  LeaderboardTableArn:
    Type: String
    Description: DynamoDB Leaderboard Table ARN

Resources:
  # AppSync GraphQL API
  GraphQLApi:
    Type: AWS::AppSync::GraphQLApi
    Properties:
      Name: !Sub '${ProjectName}-${Environment}-api'
      AuthenticationType: AMAZON_COGNITO_USER_POOLS
      UserPoolConfig:
        UserPoolId: !Ref UserPoolId
        AwsRegion: !Ref AWS::Region
        DefaultAction: ALLOW
      AdditionalAuthenticationProviders:
        - AuthenticationType: API_KEY
      XrayEnabled: true
      LogConfig:
        CloudWatchLogsRoleArn: !GetAtt AppSyncLogsRole.Arn
        ExcludeVerboseContent: false
        FieldLogLevel: ALL
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # API Key for public access
  GraphQLApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Description: API Key for public access
      Expires: !If
        - IsProd
        - 1767225600  # 2026-01-01
        - 1735689600  # 2025-01-01

  # CloudWatch Logs Role for AppSync
  AppSyncLogsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-appsync-logs-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'

  # DynamoDB Data Source Role
  AppSyncDynamoDBRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-appsync-dynamodb-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appsync.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !Ref UsersTableArn
                  - !Sub '${UsersTableArn}/index/*'
                  - !Ref GamesTableArn
                  - !Sub '${GamesTableArn}/index/*'
                  - !Ref FriendsTableArn
                  - !Sub '${FriendsTableArn}/index/*'
                  - !Ref SessionsTableArn
                  - !Sub '${SessionsTableArn}/index/*'
                  - !Ref AchievementsTableArn
                  - !Sub '${AchievementsTableArn}/index/*'
                  - !Ref ActivitiesTableArn
                  - !Sub '${ActivitiesTableArn}/index/*'
                  - !Ref LeaderboardTableArn
                  - !Sub '${LeaderboardTableArn}/index/*'

  # GraphQL Schema
  GraphQLSchema:
    Type: AWS::AppSync::GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Definition: |
        type Query {
          # User Queries
          getUser(id: ID!): User
          getUserByEmail(email: String!): User
          getUserByUsername(username: String!): User
          searchUsers(query: String!, limit: Int): [User!]!
          
          # Stats Queries
          getUserStats(userId: ID!): PlayerStats
          getPlayerProfile(userId: ID!): PlayerProfile
          
          # Game Queries
          getGame(id: ID!): Game
          listGames(filter: GameFilterInput, limit: Int, nextToken: String): GameConnection!
          listTopGames(filter: GameFilterInput, limit: Int): [Game!]!
          getGameDetails(id: ID!): GameDetails
          
          # Friends Queries
          getFriends(userId: ID!): [Friend!]!
          getFriendRequests(userId: ID!): [FriendRequest!]!
          
          # Activity Queries
          getRecentActivities(userId: ID!, limit: Int): [Activity!]!
          getFriendActivities(userId: ID!, limit: Int): [Activity!]!
          
          # Leaderboard Queries
          getLeaderboard(filter: LeaderboardFilterInput): [LeaderboardEntry!]!
          getUserRank(userId: ID!, type: LeaderboardType!): LeaderboardEntry
          
          # Live Sessions
          getLiveSessions(friendsOnly: Boolean): [GameSession!]!
          getUserSession(userId: ID!): GameSession
        }

        type Mutation {
          # User Mutations
          createUser(input: CreateUserInput!): User!
          updateUser(input: UpdateUserInput!): User!
          updateUserStatus(status: UserStatus!): User!
          
          # Friend Mutations
          sendFriendRequest(toUserId: ID!): FriendRequest!
          respondToFriendRequest(requestId: ID!, accept: Boolean!): Friend
          removeFriend(friendId: ID!): Boolean!
          
          # Session Mutations
          startGameSession(gameId: ID!): GameSession!
          endGameSession(sessionId: ID!): GameSession!
          updateGameSession(sessionId: ID!, input: UpdateSessionInput!): GameSession!
          
          # Activity Mutations
          createActivity(input: CreateActivityInput!): Activity!
        }

        type Subscription {
          # Friend Subscriptions
          onFriendStatusChange(userId: ID!): FriendStatusEvent
            @aws_subscribe(mutations: ["updateUserStatus"])
          
          onFriendActivity(userId: ID!): Activity
            @aws_subscribe(mutations: ["createActivity"])
          
          # Session Subscriptions
          onLiveSessionUpdate: GameSessionEvent
            @aws_subscribe(mutations: ["startGameSession", "endGameSession", "updateGameSession"])
          
          # Leaderboard Subscriptions
          onLeaderboardUpdate(type: LeaderboardType!): LeaderboardUpdateEvent
        }

        # Types
        type User {
          id: ID!
          email: String!
          username: String!
          avatar: String
          rank: Rank!
          xp: Int!
          level: Int!
          status: UserStatus!
          createdAt: AWSDateTime!
          updatedAt: AWSDateTime!
        }

        type PlayerStats {
          userId: ID!
          totalHoursPlayed: Float!
          gamesOwned: Int!
          achievementsUnlocked: Int!
          totalWins: Int!
          totalMatches: Int!
          winRate: Float!
          weeklyPlaytime: [Float!]!
          currentStreak: Int!
          longestStreak: Int!
        }

        type PlayerProfile {
          user: User!
          stats: PlayerStats!
          gameStats: [GameStats!]!
          achievements: [Achievement!]!
          recentActivity: [Activity!]!
        }

        type Game {
          id: ID!
          name: String!
          genre: String!
          coverImage: String!
          rating: Float!
          activePlayers: Int!
          platforms: [String!]!
          releaseDate: AWSDate
          developer: String
          publisher: String
        }

        type GameDetails {
          game: Game!
          description: String
          screenshots: [String!]
          userStats: GameStats
          leaderboard: [LeaderboardEntry!]
        }

        type GameStats {
          gameId: ID!
          gameName: String!
          gameCover: String
          hoursPlayed: Float!
          lastPlayed: AWSDateTime!
          rank: Rank!
          winRate: Float!
          totalMatches: Int!
          wins: Int!
          losses: Int!
        }

        type Friend {
          id: ID!
          username: String!
          avatar: String
          status: UserStatus!
          currentGame: String
          rank: Rank!
          friendSince: AWSDateTime!
        }

        type FriendRequest {
          id: ID!
          fromUser: User!
          toUser: User!
          status: FriendRequestStatus!
          createdAt: AWSDateTime!
        }

        type Achievement {
          id: ID!
          name: String!
          description: String!
          icon: String!
          rarity: Rarity!
          unlockedAt: AWSDateTime
          gameId: ID
          gameName: String
        }

        type Activity {
          id: ID!
          userId: ID!
          username: String!
          avatar: String
          type: ActivityType!
          title: String!
          description: String
          gameId: ID
          gameName: String
          gameCover: String
          timestamp: AWSDateTime!
        }

        type GameSession {
          id: ID!
          oderId: ID!
          username: String!
          avatar: String
          gameId: ID!
          gameName: String!
          gameCover: String
          startTime: AWSDateTime!
          endTime: AWSDateTime
          duration: Int
          isActive: Boolean!
        }

        type LeaderboardEntry {
          userId: ID!
          username: String!
          avatar: String
          rank: Int!
          previousRank: Int
          score: Int!
          change: Int
          userRank: Rank!
        }

        type GameConnection {
          items: [Game!]!
          nextToken: String
        }

        # Events
        type FriendStatusEvent {
          oderId: ID!
          status: UserStatus!
          currentGame: String
        }

        type GameSessionEvent {
          type: SessionEventType!
          session: GameSession!
        }

        type LeaderboardUpdateEvent {
          type: LeaderboardType!
          entries: [LeaderboardEntry!]!
        }

        # Inputs
        input CreateUserInput {
          email: String!
          username: String!
          avatar: String
        }

        input UpdateUserInput {
          username: String
          avatar: String
        }

        input GameFilterInput {
          genre: String
          platform: String
          sortBy: GameSortBy
          timeRange: TimeRange
        }

        input LeaderboardFilterInput {
          type: LeaderboardType
          metric: LeaderboardMetric
          timeRange: TimeRange
          gameId: ID
        }

        input UpdateSessionInput {
          status: String
        }

        input CreateActivityInput {
          type: ActivityType!
          title: String!
          description: String
          gameId: ID
          gameName: String
        }

        # Enums
        enum UserStatus {
          ONLINE
          OFFLINE
          PLAYING
          AWAY
          DO_NOT_DISTURB
        }

        enum Rank {
          BRONZE
          SILVER
          GOLD
          PLATINUM
          DIAMOND
          MASTER
          GRANDMASTER
        }

        enum Rarity {
          COMMON
          UNCOMMON
          RARE
          EPIC
          LEGENDARY
        }

        enum ActivityType {
          GAME_STARTED
          GAME_ENDED
          ACHIEVEMENT_UNLOCKED
          RANK_UP
          FRIEND_ADDED
          MILESTONE
        }

        enum FriendRequestStatus {
          PENDING
          ACCEPTED
          DECLINED
        }

        enum GameSortBy {
          ACTIVE_PLAYERS
          RATING
          RELEASE_DATE
          NAME
        }

        enum TimeRange {
          TODAY
          WEEK
          MONTH
          ALL_TIME
        }

        enum LeaderboardType {
          GLOBAL
          FRIENDS
          GAME
        }

        enum LeaderboardMetric {
          HOURS
          WINS
          ACHIEVEMENTS
          XP
        }

        enum SessionEventType {
          STARTED
          ENDED
          UPDATED
        }

  # Data Sources
  UsersDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: UsersDataSource
      Type: AMAZON_DYNAMODB
      ServiceRoleArn: !GetAtt AppSyncDynamoDBRole.Arn
      DynamoDBConfig:
        TableName: !Ref UsersTableName
        AwsRegion: !Ref AWS::Region

  GamesDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: GamesDataSource
      Type: AMAZON_DYNAMODB
      ServiceRoleArn: !GetAtt AppSyncDynamoDBRole.Arn
      DynamoDBConfig:
        TableName: !Ref GamesTableName
        AwsRegion: !Ref AWS::Region

  FriendsDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: FriendsDataSource
      Type: AMAZON_DYNAMODB
      ServiceRoleArn: !GetAtt AppSyncDynamoDBRole.Arn
      DynamoDBConfig:
        TableName: !Ref FriendsTableName
        AwsRegion: !Ref AWS::Region

  SessionsDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: SessionsDataSource
      Type: AMAZON_DYNAMODB
      ServiceRoleArn: !GetAtt AppSyncDynamoDBRole.Arn
      DynamoDBConfig:
        TableName: !Ref SessionsTableName
        AwsRegion: !Ref AWS::Region

  ActivitiesDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: ActivitiesDataSource
      Type: AMAZON_DYNAMODB
      ServiceRoleArn: !GetAtt AppSyncDynamoDBRole.Arn
      DynamoDBConfig:
        TableName: !Ref ActivitiesTableName
        AwsRegion: !Ref AWS::Region

  LeaderboardDataSource:
    Type: AWS::AppSync::DataSource
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      Name: LeaderboardDataSource
      Type: AMAZON_DYNAMODB
      ServiceRoleArn: !GetAtt AppSyncDynamoDBRole.Arn
      DynamoDBConfig:
        TableName: !Ref LeaderboardTableName
        AwsRegion: !Ref AWS::Region

  # Resolvers
  GetUserResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getUser
      DataSourceName: !GetAtt UsersDataSource.Name
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      Code: |
        import { util } from '@aws-appsync/utils';
        
        export function request(ctx) {
          return {
            operation: 'GetItem',
            key: util.dynamodb.toMapValues({ id: ctx.args.id }),
          };
        }
        
        export function response(ctx) {
          return ctx.result;
        }

  GetUserStatsResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getUserStats
      DataSourceName: !GetAtt UsersDataSource.Name
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      Code: |
        import { util } from '@aws-appsync/utils';
        
        export function request(ctx) {
          return {
            operation: 'GetItem',
            key: util.dynamodb.toMapValues({ id: ctx.args.userId }),
          };
        }
        
        export function response(ctx) {
          if (!ctx.result) return null;
          return {
            oderId: ctx.result.id,
            totalHoursPlayed: ctx.result.totalHoursPlayed || 0,
            gamesOwned: ctx.result.gamesOwned || 0,
            achievementsUnlocked: ctx.result.achievementsUnlocked || 0,
            totalWins: ctx.result.totalWins || 0,
            totalMatches: ctx.result.totalMatches || 0,
            winRate: ctx.result.winRate || 0,
            weeklyPlaytime: ctx.result.weeklyPlaytime || [0,0,0,0,0,0,0],
            currentStreak: ctx.result.currentStreak || 0,
            longestStreak: ctx.result.longestStreak || 0,
          };
        }

  ListGamesResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: listGames
      DataSourceName: !GetAtt GamesDataSource.Name
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      Code: |
        import { util } from '@aws-appsync/utils';
        
        export function request(ctx) {
          const { limit = 20, nextToken } = ctx.args;
          return {
            operation: 'Scan',
            limit,
            nextToken,
          };
        }
        
        export function response(ctx) {
          return {
            items: ctx.result.items,
            nextToken: ctx.result.nextToken,
          };
        }

  GetFriendsResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getFriends
      DataSourceName: !GetAtt FriendsDataSource.Name
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      Code: |
        import { util } from '@aws-appsync/utils';
        
        export function request(ctx) {
          return {
            operation: 'Query',
            query: {
              expression: 'userId = :userId',
              expressionValues: util.dynamodb.toMapValues({ ':userId': ctx.args.userId }),
            },
          };
        }
        
        export function response(ctx) {
          return ctx.result.items;
        }

  GetLiveSessionsResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getLiveSessions
      DataSourceName: !GetAtt SessionsDataSource.Name
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      Code: |
        import { util } from '@aws-appsync/utils';
        
        export function request(ctx) {
          return {
            operation: 'Query',
            index: 'isActive-index',
            query: {
              expression: 'isActive = :active',
              expressionValues: util.dynamodb.toMapValues({ ':active': 'true' }),
            },
            scanIndexForward: false,
          };
        }
        
        export function response(ctx) {
          return ctx.result.items;
        }

  GetLeaderboardResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Query
      FieldName: getLeaderboard
      DataSourceName: !GetAtt LeaderboardDataSource.Name
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      Code: |
        import { util } from '@aws-appsync/utils';
        
        export function request(ctx) {
          const filter = ctx.args.filter || {};
          const type = filter.type || 'GLOBAL';
          const metric = filter.metric || 'HOURS';
          
          return {
            operation: 'Query',
            index: 'score-index',
            query: {
              expression: 'pk = :pk',
              expressionValues: util.dynamodb.toMapValues({ 
                ':pk': `${type}#${metric}` 
              }),
            },
            scanIndexForward: false,
            limit: 100,
          };
        }
        
        export function response(ctx) {
          return ctx.result.items.map((item, index) => ({
            ...item,
            rank: index + 1,
          }));
        }

  # Mutation Resolvers
  StartGameSessionResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Mutation
      FieldName: startGameSession
      DataSourceName: !GetAtt SessionsDataSource.Name
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      Code: |
        import { util } from '@aws-appsync/utils';
        
        export function request(ctx) {
          const id = util.autoId();
          const now = util.time.nowISO8601();
          
          return {
            operation: 'PutItem',
            key: util.dynamodb.toMapValues({ id }),
            attributeValues: util.dynamodb.toMapValues({
              oderId: ctx.identity.sub,
              gameId: ctx.args.gameId,
              startTime: now,
              isActive: 'true',
            }),
          };
        }
        
        export function response(ctx) {
          return ctx.result;
        }

  EndGameSessionResolver:
    Type: AWS::AppSync::Resolver
    DependsOn: GraphQLSchema
    Properties:
      ApiId: !GetAtt GraphQLApi.ApiId
      TypeName: Mutation
      FieldName: endGameSession
      DataSourceName: !GetAtt SessionsDataSource.Name
      Runtime:
        Name: APPSYNC_JS
        RuntimeVersion: 1.0.0
      Code: |
        import { util } from '@aws-appsync/utils';
        
        export function request(ctx) {
          const now = util.time.nowISO8601();
          
          return {
            operation: 'UpdateItem',
            key: util.dynamodb.toMapValues({ id: ctx.args.sessionId }),
            update: {
              expression: 'SET endTime = :endTime, isActive = :inactive',
              expressionValues: util.dynamodb.toMapValues({
                ':endTime': now,
                ':inactive': 'false',
              }),
            },
          };
        }
        
        export function response(ctx) {
          return ctx.result;
        }

Conditions:
  IsProd: !Equals [!Ref Environment, 'prod']

Outputs:
  GraphQLApiId:
    Description: AppSync GraphQL API ID
    Value: !GetAtt GraphQLApi.ApiId
    Export:
      Name: !Sub '${ProjectName}-${Environment}-GraphQLApiId'

  GraphQLApiEndpoint:
    Description: AppSync GraphQL API Endpoint
    Value: !GetAtt GraphQLApi.GraphQLUrl
    Export:
      Name: !Sub '${ProjectName}-${Environment}-GraphQLApiEndpoint'

  GraphQLApiArn:
    Description: AppSync GraphQL API ARN
    Value: !GetAtt GraphQLApi.Arn
    Export:
      Name: !Sub '${ProjectName}-${Environment}-GraphQLApiArn'

  GraphQLApiKey:
    Description: AppSync API Key
    Value: !GetAtt GraphQLApiKey.ApiKey
    Export:
      Name: !Sub '${ProjectName}-${Environment}-GraphQLApiKey'
